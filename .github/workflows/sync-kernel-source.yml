name: Sync kernel common LTS branches

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-kernel-common-lts
  cancel-in-progress: true

jobs:
  sync:
    name: Sync ${{ matrix.ack_branch }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        ack_branch:
          - android11-5.4-lts
          - android12-5.4-lts
          - android12-5.10-lts
          - android13-5.10-lts
          - android13-5.15-lts
          - android14-5.15-lts
          - android14-6.1-lts
          - android15-6.6-lts
          - android16-6.12-lts

    env:
      UPSTREAM_URL: https://android.googlesource.com/kernel/common

    steps:
      - name: Disable IPv6
        shell: bash
        run: |
          set -euo pipefail
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Checkout mirror repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream "$UPSTREAM_URL"

      - name: Fetch upstream branch
        shell: bash
        run: |
          set -euo pipefail

          ACK_BRANCH="${{ matrix.ack_branch }}"

          # --update-shallow: on subsequent syncs, extends the existing shallow
          # boundary rather than creating a new disconnected shallow root.
          # --depth=200: keeps CI bandwidth bounded while preserving meaningful
          # ancestry; the window grows with each sync via --update-shallow.
          # Fall back without --update-shallow for first-time fetches.
          git fetch upstream "$ACK_BRANCH" \
            --depth=200 \
            --update-shallow \
            --no-tags \
          || git fetch upstream "$ACK_BRANCH" \
            --depth=200 \
            --no-tags

          UPSTREAM_TIP=$(git rev-parse FETCH_HEAD)
          echo "ACK_BRANCH=$ACK_BRANCH" >> "$GITHUB_ENV"
          echo "UPSTREAM_TIP=$UPSTREAM_TIP" >> "$GITHUB_ENV"
          echo "UPSTREAM_SHORT=$(git rev-parse --short FETCH_HEAD)" >> "$GITHUB_ENV"

          # Read kernel version from the fetched tree without a full checkout.
          KERNEL_VERSION=$(git show FETCH_HEAD:Makefile 2>/dev/null \
            | awk '/^VERSION =/{v=$3} /^PATCHLEVEL =/{p=$3} /^SUBLEVEL =/{s=$3}
                   END{if(v) printf "%s.%s.%s", v, p, s}')
          echo "KERNEL_VERSION=${KERNEL_VERSION:-unknown}" >> "$GITHUB_ENV"

      - name: Check if mirror is already current
        id: uptodate
        shell: bash
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --heads origin "$ACK_BRANCH" >/dev/null 2>&1; then
            MIRROR_TIP=$(git ls-remote origin "refs/heads/$ACK_BRANCH" | awk '{print $1}')
            if [ "${MIRROR_TIP:-}" = "$UPSTREAM_TIP" ]; then
              echo "already_current=true" >> "$GITHUB_OUTPUT"
              echo "Mirror already at upstream HEAD $UPSTREAM_TIP — skipping push."
            fi
          fi

      - name: Push upstream commits to mirror
        if: steps.uptodate.outputs.already_current != 'true'
        shell: bash
        run: |
          set -euo pipefail

          # Push the actual upstream commit objects — not a synthetic snapshot.
          # This preserves:
          #   - the upstream commit SHA and parent chain
          #   - cross-branch object sharing (branches that share Linux history
          #     share pack objects in the mirror)
          #   - delta compression between branches
          #
          # --force-with-lease: safe non-fast-forward push; fails if the mirror
          # ref was updated by a concurrent process since our last fetch.
          # This handles both:
          #   - normal incremental updates (upstream moved forward)
          #   - migration from synthetic/orphan history (one-time replacement)
          git push origin "FETCH_HEAD:refs/heads/$ACK_BRANCH" \
            --force-with-lease="refs/heads/$ACK_BRANCH"

          echo "### Synced: $ACK_BRANCH" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Upstream commit | \`$UPSTREAM_TIP\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Kernel version | \`$KERNEL_VERSION\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source | [\`$ACK_BRANCH\`]($UPSTREAM_URL/+log/$ACK_BRANCH) |" >> "$GITHUB_STEP_SUMMARY"
